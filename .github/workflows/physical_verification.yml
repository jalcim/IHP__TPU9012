name: Physical Verification

on: 
    push:
    pull_request:
        branches: [ main]
    workflow_dispatch:

jobs:
    drc:
        runs-on: ubuntu-22.04
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Install system dependencies
                run: |
                    sudo apt-get update -qq -y
                    sudo apt-get install -y jq python3-pip
            -   name: Resolve release inputs
                run: |
                    GDS_PATH=$(jq -r '.release.gds // empty' doc/info.json)
                    NETLIST_PATH=$(jq -r '.release.netlist // empty' doc/info.json)
                    GDS_REF=false
                    NETLIST_REF=false
                    RUN_DRC=false
                    RUN_LVS=false

                    if [[ -n "$GDS_PATH" && "$GDS_PATH" != "null" ]]; then
                        GDS_REF=true
                    fi
                    if [[ -n "$NETLIST_PATH" && "$NETLIST_PATH" != "null" ]]; then
                        NETLIST_REF=true
                    fi

                    if [[ "$GDS_REF" == false && "$NETLIST_REF" == false ]]; then
                        echo "::warning::No release.gds or release.netlist referenced in doc/info.json. Skipping DRC and LVS."
                        echo "run_drc=false" >> "$GITHUB_OUTPUT"
                        echo "run_lvs=false" >> "$GITHUB_OUTPUT"
                        exit 0
                    fi

                    if [[ "$GDS_REF" == true && ! -f "$GDS_PATH" ]]; then
                        echo "release.gds references a missing file: $GDS_PATH"
                        exit 1
                    fi

                    if [[ "$NETLIST_REF" == true && ! -f "$NETLIST_PATH" ]]; then
                        echo "release.netlist references a missing file: $NETLIST_PATH"
                        exit 1
                    fi

                    if [[ "$NETLIST_REF" == true && "$GDS_REF" == false ]]; then
                        echo "release.netlist is set but release.gds is missing; LVS requires a layout"
                        exit 1
                    fi

                    if [[ "$GDS_REF" == true ]]; then
                        RUN_DRC=true
                    fi
                    if [[ "$NETLIST_REF" == true ]]; then
                        RUN_LVS=true
                    else
                        echo "::warning::release.netlist not set. LVS will be skipped."
                    fi

                    echo "gds_path=$GDS_PATH" >> "$GITHUB_OUTPUT"
                    echo "netlist_path=$NETLIST_PATH" >> "$GITHUB_OUTPUT"
                    echo "run_drc=$RUN_DRC" >> "$GITHUB_OUTPUT"
                    echo "run_lvs=$RUN_LVS" >> "$GITHUB_OUTPUT"
                id: resolve-inputs
            -   name: Download latest KLayout (Ubuntu amd64)
                if: steps.resolve-inputs.outputs.run_drc == 'true' || steps.resolve-inputs.outputs.run_lvs == 'true'
                run: |
                    UBUNTU_VERSION=$(lsb_release -rs | cut -d. -f1)
                    KLAYOUT_URL=$(curl -fLs https://www.klayout.de/build.html | grep -o "https://www\.klayout\.org/downloads/Ubuntu-${UBUNTU_VERSION}/[^\"]*amd64\.deb" | head -n 1)
                    if [[ -z "$KLAYOUT_URL" ]]; then
                        echo "KLayout .deb URL not found on build.html for Ubuntu ${UBUNTU_VERSION}"
                        exit 1
                    fi
                    curl -fL -o /tmp/klayout_amd64.deb "$KLAYOUT_URL"
                    if ! dpkg-deb --info /tmp/klayout_amd64.deb >/dev/null 2>&1; then
                        echo "Downloaded file is not a valid Debian archive"
                        exit 1
                    fi
            -   name: Install KLayout
                if: steps.resolve-inputs.outputs.run_drc == 'true' || steps.resolve-inputs.outputs.run_lvs == 'true'
                run: |
                    sudo dpkg -i /tmp/klayout_amd64.deb || true
                    sudo apt-get install -f -y
                    klayout -v
            -   name: Install IHP-Open-PDK Python requirements
                if: steps.resolve-inputs.outputs.run_drc == 'true' || steps.resolve-inputs.outputs.run_lvs == 'true'
                run: |
                    python3 -m pip install --upgrade pip
                    python3 -m pip install -r https://raw.githubusercontent.com/IHP-GmbH/IHP-Open-PDK/main/requirements.txt
            -   name: Fetch IHP DRC deck and dependencies
                if: steps.resolve-inputs.outputs.run_drc == 'true' || steps.resolve-inputs.outputs.run_lvs == 'true'
                run: |
                    git clone --depth 1 --filter=blob:none --sparse https://github.com/IHP-GmbH/IHP-Open-PDK.git /tmp/ihp-open-pdk
                    git -C /tmp/ihp-open-pdk sparse-checkout set --no-cone /ihp-sg13g2/libs.tech/klayout/tech/drc/ /ihp-sg13g2/libs.tech/klayout/tech/lvs/ /ihp-sg13g2/libs.tech/klayout/python/sg13g2_pycell_lib/sg13g2_tech_mod.json
            -   name: Run DRC on release GDS
                if: steps.resolve-inputs.outputs.run_drc == 'true'
                run: |
                    mkdir -p /tmp/drc-results
                    python3 /tmp/ihp-open-pdk/ihp-sg13g2/libs.tech/klayout/tech/drc/run_drc.py --path="${{ steps.resolve-inputs.outputs.gds_path }}" --run_dir=/tmp/drc-results --mp=8 --precheck_drc --no_offgrid --no_recommended --density_thr=8 --no_angle --disable_extra_rules
                shell: bash
            -   name: Run LVS on release netlist (if present)
                if: steps.resolve-inputs.outputs.run_lvs == 'true'
                run: |
                    mkdir -p /tmp/lvs-results
                    python3 /tmp/ihp-open-pdk/ihp-sg13g2/libs.tech/klayout/tech/lvs/run_lvs.py --layout="${{ steps.resolve-inputs.outputs.gds_path }}" --netlist="${{ steps.resolve-inputs.outputs.netlist_path }}" --run_dir=/tmp/lvs-results
                shell: bash
            -   name: Archive DRC Results
                uses: actions/upload-artifact@v4
                if: always()
                with:
                    name: DRC-Results
                    path: /tmp/drc-results
            -   name: Archive LVS Results
                uses: actions/upload-artifact@v4
                if: always()
                with:
                    name: LVS-Results
                    path: /tmp/lvs-results
